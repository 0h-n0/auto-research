[project]
name = "{pkg_name}"
version = "0.1.0"
description = "Experimental code for research project: {slug}"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "MIT"
authors = [{ name = "research-team" }]

dependencies = [
    "torch>=2.4",
    "transformers>=4.45",
    "datasets>=3.0",
    "accelerate>=1.0",
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "numpy>=1.26",
    "pandas>=2.2",
    "matplotlib>=3.8",
    "seaborn>=0.13",
    "tqdm>=4.66",
    "pydantic>=2.7",
]

[project.optional-dependencies]
attention = [
    "transformer_lens>=2.0",
    "nnsight>=0.3",
    "circuitsvis>=1.43",
    "einops>=0.8",
    "jaxtyping>=0.2.34",
]
evaluation = [
    "lm-eval[api]>=0.4.7",
]
post-training = [
    "peft>=0.13",
    "trl>=0.11",
    "bitsandbytes>=0.43",
]
# Observability (opt-in, v0.5.0+) — set WANDB_API_KEY or MLFLOW_TRACKING_URI to enable
wandb = [
    "wandb>=0.18",
]
mlflow = [
    "mlflow>=2.16",
]
tensorboard = [
    "tensorboard>=2.18",
]
dev = [
    "pytest>=8.0",
    "pytest-xdist>=3.6",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "mypy>=1.11",
    "pyright>=1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/{pkg_name}"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
markers = [
    "gpu: requires GPU",
    "slow: long-running",
]
